<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>🔗 URL Shortener</h1>
        
        <div class="input-group">
            <input type="url" id="urlInput" placeholder="Enter your long URL here..." required>
            <button id="shortenBtn" onclick="shortenUrl()">Shorten</button>
        </div>
        
        <div id="result" class="result">
            <h3>Shortened URL:</h3>
            <div class="short-url" id="shortUrl"></div>
            <button class="copy-btn" onclick="copyToClipboard()">Copy to Clipboard</button>
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <div class="stats-section">
            <h3>📊 Statistics</h3>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalUrls">0</div>
                    <div class="stat-label">Total URLs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalClicks">0</div>
                    <div class="stat-label">Total Clicks</div>
                </div>
            </div>
            
            <div class="url-list">
                <h4>Recent URLs:</h4>
                <div id="urlList"></div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
